<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIZIO</title>
</head>
<body>
    <form id="searchForm">
        <input type="text" id="query" placeholder="Hledat...">
        <button type="submit">Hledat</button>
    </form>

    <div id="results">

    </div>
    <script> 
        const form = document.getElementById("searchForm")
        const input = document.getElementById("query")
        const container = document.getElementById("results")

        form.addEventListener("submit", function (e) {
            e.preventDefault()
            search()
        })

        function search() {
            const query = input.value.trim()

            //  VALIDACE
            if (!query) {
                container.innerHTML = "<p>Zadejte hledaný výraz.</p>"
                return
            }

            //  LOADING 
            container.innerHTML = "<p>Načítám výsledky...</p>"

            fetch(`/search?q=${query}`)
                .then(response => response.json())
                .then(data => {
                    const results = data.results || data

                    //  EMPTY
                    if (!results.length) {
                        container.innerHTML = "<p>Nebyly nalezeny žádné výsledky.</p>"
                        return
                    }

                    //  RESET
                    container.innerHTML = ""

                    //  RENDER
                    results.forEach(item => {
                        container.innerHTML += `
                            <div>
                                <h3>
                                    <a href="${item.link}" target="_blank">
                                        ${item.title}
                                    </a>
                                </h3>
                                <p>${item.snippet}</p>
                            </div>
                        `
                    })
                })
                .catch(() => {
                    //  ERROR
                    container.innerHTML = "<p>Nepodařilo se načíst výsledky. Zkuste to znovu.</p>"
                })
        }
    </script>
</body>
</html>
