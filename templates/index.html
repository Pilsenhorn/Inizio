<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIZIO</title>
</head>
<body>
    <input type="text" id="query" placeholder="Hledat...">
    <button onclick="search()">Hledat</button>

    <div id="results">

    </div>
    <script> 
        function search() {
            const query = document.getElementById('query').value
            fetch(`/search?q=${query}`)
                .then(response => response.json())
                .then(data => {
                    const results = data
                    const container = document.getElementById('results')
                    container.innerHTML = ''

                    results.forEach(item => {
                        container.innerHTML += `
                        <div>
                            <h3>
                                <a href="${item.link}" target="_blank">
                                        ${item.title}
                                </a>
                            </h3>
                        </div>
                    `
                    })

                })
                .catch(error => console.error('Chyba při hledání:', error))
        }
    </script>
</body>
</html>
